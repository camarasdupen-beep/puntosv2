<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Raiden">
<title>Raiden — Beneficios por Puntos</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --bg:#0a0c0a;
    --card:#13160f;
    --card-line:#2a2f23;
    --gold-1:#f0cc6e;
    --gold-2:#c9952f;
    --gold-3:#8a6a1f;
    --green:#5a7d2a;
    --text:#f3f0e6;
    --muted:#8c9285;
    --danger:#c0392b;
    --border:#262b26;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Inter', -apple-system, sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    position:relative;
    overflow-x:hidden;
  }
  .watermark{
    position:fixed;
    top:50%; left:50%;
    width:600px; height:600px;
    transform:translate(-50%,-50%);
    opacity:0.035;
    z-index:0;
    pointer-events:none;
  }
  .watermark img{width:100%; height:100%; object-fit:contain;}

  .wrap{
    max-width:480px;
    margin:0 auto;
    padding:30px 18px 60px;
    position:relative;
    z-index:1;
  }
  header{
    text-align:center;
    margin-bottom:28px;
  }
  .logo-mark{
    width:58px;
    height:auto;
    margin:0 auto 10px;
    display:block;
    filter:drop-shadow(0 4px 20px rgba(240,204,110,0.25));
  }
  header h1{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:1.3rem;
    letter-spacing:0.5px;
    margin:0 0 4px;
    background:linear-gradient(135deg, var(--gold-1), var(--gold-3));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  header p{
    color:var(--muted);
    font-size:0.72rem;
    text-transform:uppercase;
    letter-spacing:2px;
    margin:0;
  }
  .card{
    background:var(--card);
    border:1px solid var(--card-line);
    border-radius:18px;
    padding:22px;
    margin-bottom:16px;
    box-shadow:0 8px 24px rgba(0,0,0,0.3);
  }
  label{
    display:block;
    font-size:0.8rem;
    color:var(--muted);
    margin-bottom:6px;
  }
  input[type="text"], input[type="number"], input[type="password"]{
    width:100%;
    padding:15px 16px;
    border-radius:12px;
    border:1px solid var(--card-line);
    background:var(--card);
    color:var(--text);
    font-size:1rem;
    margin-bottom:12px;
    transition:border-color .2s, box-shadow .2s;
  }
  input:focus{
    outline:none;
    border-color:var(--gold-2);
    box-shadow:0 0 0 3px rgba(201,149,47,0.12);
  }
  button{
    width:100%;
    padding:15px;
    border-radius:12px;
    border:none;
    font-size:0.95rem;
    font-weight:700;
    cursor:pointer;
    transition:opacity .15s, transform .1s;
    letter-spacing:0.3px;
  }
  button:active{opacity:0.85; transform:scale(0.99);}
  .btn-primary{
    background:linear-gradient(135deg, var(--gold-1), var(--gold-2));
    color:#1a1408;
    box-shadow:0 6px 20px rgba(201,149,47,0.25);
  }
  .btn-secondary{background:var(--card); color:var(--text); border:1px solid var(--card-line);}
  .btn-danger{background:var(--danger); color:#fff;}
  .btn-small{width:auto; padding:8px 14px; font-size:0.85rem;}
  .row{display:flex; gap:8px;}
  .row > *{flex:1;}

  /* Membership card */
  .membership{
    background:var(--card);
    border:1px solid var(--card-line);
    border-radius:18px;
    margin-bottom:16px;
    position:relative;
    overflow:hidden;
  }
  .membership::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:18px;
    border:1px solid transparent;
    background:linear-gradient(135deg, rgba(240,204,110,0.4), transparent 40%, transparent 60%, rgba(90,125,42,0.3)) border-box;
    -webkit-mask:linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite:xor;
    mask-composite:exclude;
    pointer-events:none;
  }
  .membership-inner{padding:26px 24px;}

  .greeting{
    font-family:'Fraunces', serif;
    font-weight:500;
    font-size:1.2rem;
    margin-bottom:20px;
    text-align:center;
  }
  .greeting .wave{margin-right:2px;}

  .points-hero{text-align:center; padding:0 0 22px;}
  .points-hero .num{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:3.6rem;
    line-height:0.9;
    background:linear-gradient(160deg, var(--gold-1) 20%, var(--gold-3) 100%);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .points-hero .lbl{
    font-size:0.75rem;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:2px;
    margin-top:6px;
  }

  .gold-line{
    height:1px;
    background:linear-gradient(90deg, transparent, var(--gold-2), transparent);
    margin:4px 0 20px;
  }

  /* Progress hacia el proximo beneficio */
  .progress-section{margin-bottom:20px;}
  .progress-label{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    font-size:0.82rem;
    margin-bottom:8px;
  }
  .progress-label .target-name{font-weight:600;}
  .progress-label .remaining{
    color:var(--gold-1);
    font-size:0.75rem;
    font-weight:600;
  }
  .progress-track{
    height:8px;
    background:var(--card-line);
    border-radius:6px;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    background:linear-gradient(90deg, var(--gold-3), var(--gold-1));
    border-radius:6px;
    transition:width .4s ease;
  }
  .progress-complete-msg{
    text-align:center;
    font-size:0.82rem;
    color:var(--green);
    font-weight:600;
    padding:4px 0;
  }

  .benefit-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:13px 0;
    border-bottom:1px solid var(--card-line);
  }
  .benefit-row:last-child{border-bottom:none;}
  .benefit-row.highlight{
    background:rgba(240,204,110,0.04);
    margin:0 -12px;
    padding:13px 12px;
    border-radius:10px;
    border-bottom:none;
  }
  .benefit-info{flex:1;}
  .benefit-name{font-weight:600; font-size:0.92rem;}
  .benefit-points{font-size:0.74rem; color:var(--muted); margin-top:2px;}
  .pill{
    font-size:0.68rem;
    font-weight:700;
    padding:5px 11px;
    border-radius:20px;
    white-space:nowrap;
    margin-left:10px;
  }
  .pill.ready{background:rgba(90,125,42,0.18); color:#9bd166; border:1px solid rgba(90,125,42,0.3);}
  .pill.wait{background:rgba(255,255,255,0.04); color:var(--muted);}

  .error-msg{
    background:rgba(192,57,43,0.15);
    color:#e88;
    padding:12px;
    border-radius:10px;
    font-size:0.85rem;
    text-align:center;
    margin-bottom:14px;
  }
  .loading{
    text-align:center;
    color:var(--muted);
    padding:20px;
    font-size:0.9rem;
  }

  .footer-link{
    text-align:center;
    margin-top:24px;
  }
  .footer-link a{
    color:var(--muted);
    font-size:0.75rem;
    text-decoration:none;
  }

  .admin-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 0;
    border-bottom:1px solid var(--card-line);
    gap:10px;
  }
  .admin-item:last-child{border-bottom:none;}
  .admin-item-info{flex:1;}
  .admin-item-actions{display:flex; gap:6px;}
  .admin-item-actions button{width:auto; padding:8px 12px; font-size:0.8rem;}

  .hidden{display:none !important;}

  .toast{
    position:fixed;
    bottom:24px;
    left:50%;
    transform:translateX(-50%);
    background:var(--card);
    color:#fff;
    padding:12px 22px;
    border-radius:30px;
    font-size:0.85rem;
    z-index:999;
    box-shadow:0 4px 16px rgba(0,0,0,0.4);
    border:1px solid rgba(240,204,110,0.25);
    animation:toast-in 0.25s ease-out;
  }
  .toast.toast-out{
    animation:toast-out 0.2s ease-in forwards;
  }

  /* ============== ANIMACIONES ============== */
  @keyframes fade-in-up{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
  }
  @keyframes fade-in{
    from{opacity:0;}
    to{opacity:1;}
  }
  @keyframes toast-in{
    from{opacity:0; transform:translate(-50%, 10px);}
    to{opacity:1; transform:translate(-50%, 0);}
  }
  @keyframes toast-out{
    from{opacity:1; transform:translate(-50%, 0);}
    to{opacity:0; transform:translate(-50%, 10px);}
  }
  @keyframes spin{
    to{transform:rotate(360deg);}
  }
  @keyframes progress-grow{
    from{width:0%;}
  }

  header{animation:fade-in-up 0.5s ease-out;}
  #clientView > .card{animation:fade-in-up 0.5s ease-out 0.1s backwards;}
  .membership{animation:fade-in-up 0.45s ease-out;}
  .error-msg{animation:fade-in-up 0.35s ease-out;}

  .spinner-wrap{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    padding:24px 0;
    color:var(--muted);
    font-size:0.88rem;
  }
  .spinner{
    width:18px;
    height:18px;
    border-radius:50%;
    border:2px solid var(--card-line);
    border-top-color:var(--gold-1);
    animation:spin 0.7s linear infinite;
  }

  .progress-fill{animation:progress-grow 0.7s ease-out 0.1s backwards;}

  .benefit-row{animation:fade-in 0.4s ease-out backwards;}
</style>
</head>

// ============== HELPERS REDIS (Upstash REST) ==============
async function redisGet(key){
  const res = await fetch(`${UPSTASH_URL}/get/${encodeURIComponent(key)}`, {
    headers: { Authorization: `Bearer ${UPSTASH_TOKEN}` }
  });
  if(!res.ok){
    let detalle = "";
    try{ detalle = await res.text(); }catch(_){}
    throw new Error(`Redis ${res.status}: ${detalle || res.statusText}`);
  }
  const data = await res.json();
  return data.result ? JSON.parse(data.result) : null;
}

async function redisSet(key, value){
  try{
    const res = await fetch(`${UPSTASH_URL}/set/${encodeURIComponent(key)}`, {
      method: "POST",
      headers: {
        Authorization: `Bearer ${UPSTASH_TOKEN}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify(value)
    });
    if(!res.ok) throw new Error("Redis SET fallo: " + res.status);
    return true;
  }catch(e){
    console.error("redisSet error:", e);
    return false;
  }
}

  if(!res.ok){
    let detalle = "";
    try{ detalle = await res.text(); }catch(_){}
    throw new Error(`Loyverse ${res.status}: ${detalle || res.statusText}`);
  }
  const data = await res.json();
  if(!data.customers || data.customers.length === 0){
    return null;
  }
  return data.customers[0];
}

// ============== ESTADO ==============
let benefits = [];

// ============== UI: VISTA CLIENTE ==============
const dniInput = document.getElementById("dniInput");
const searchBtn = document.getElementById("searchBtn");
const resultArea = document.getElementById("resultArea");

searchBtn.addEventListener("click", buscarPuntos);
dniInput.addEventListener("keypress", (e) => {
  if(e.key === "Enter") buscarPuntos();
});

async function buscarPuntos(){
  const dni = dniInput.value.trim();
  if(!dni){
    resultArea.innerHTML = `<div class="error-msg">Ingresá tu DNI para consultar.</div>`;
    return;
  }

  resultArea.innerHTML = `<div class="spinner-wrap"><div class="spinner"></div> Buscando tus puntos...</div>`;
  searchBtn.disabled = true;

  try{
    const cliente = await buscarClientePorDNI(dni);

    if(!cliente){
      resultArea.innerHTML = `<div class="error-msg">No encontramos un cliente con ese DNI. Verificá el número o consultá en el local.</div>`;
      searchBtn.disabled = false;
      return;
    }

    const puntos = cliente.total_points || 0;
    const nombre = cliente.name || "";

    // Cargar beneficios actuales desde Redis (siempre frescos)
    const listaBeneficios = await redisGet(BENEFITS_KEY) || [];

    renderResultado(nombre, puntos, listaBeneficios);

  }catch(e){
    console.error(e);
    resultArea.innerHTML = `<div class="error-msg">Error técnico: ${escapeHtml(e.message || String(e))}</div>`;
  }finally{
    searchBtn.disabled = false;
  }
}

function renderResultado(nombre, puntos, listaBeneficios){
  const ordenados = [...listaBeneficios].sort((a,b) => a.points - b.points);
  const pendientes = ordenados.filter(b => puntos < b.points);
  const proximo = pendientes.length > 0 ? pendientes[0] : null;

  let progressHtml = "";
  if(proximo){
    const pct = Math.min(100, Math.round((puntos / proximo.points) * 100));
    const faltan = proximo.points - puntos;
    progressHtml = `
      <div class="progress-section">
        <div class="progress-label">
          <span class="target-name">${escapeHtml(proximo.name)}</span>
          <span class="remaining">Faltan ${faltan} pts</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" style="width:${pct}%;"></div>
        </div>
      </div>
    `;
  }else if(ordenados.length > 0){
    progressHtml = `<div class="progress-complete-msg">¡Alcanzaste todos los beneficios disponibles! 🎉</div>`;
  }

  let benefitsHtml = "";
  if(ordenados.length === 0){
    benefitsHtml = `<p style="color:var(--muted); text-align:center; margin:0; font-size:0.88rem;">Todavía no hay beneficios cargados.</p>`;
  }else{
    benefitsHtml = ordenados.map((b, i) => {
      const alcanza = puntos >= b.points;
      const esElProximo = proximo && b.id === proximo.id;
      return `
        <div class="benefit-row${esElProximo ? " highlight" : ""}" style="animation-delay:${0.15 + i * 0.06}s;">
          <div class="benefit-info">
            <div class="benefit-name">${escapeHtml(b.name)}</div>
            <div class="benefit-points">${b.points} puntos${!alcanza ? ` · faltan ${b.points - puntos}` : ""}</div>
          </div>
          <span class="pill ${alcanza ? "ready" : "wait"}">${alcanza ? "Disponible" : "Pendiente"}</span>
        </div>
      `;
    }).join("");
  }

  const html = `
    <div class="membership">
      <div class="membership-inner">
        <div class="greeting">${nombre ? `<span class="wave">👋</span> ¡Hola, ${escapeHtml(nombre)}!` : "¡Hola!"}</div>

        <div class="points-hero">
          <div class="num">${puntos}</div>
          <div class="lbl">Puntos acumulados</div>
        </div>

        ${progressHtml ? `<div class="gold-line"></div>${progressHtml}` : ""}

        <div class="gold-line"></div>

        ${benefitsHtml}
      </div>
    </div>
  `;

  resultArea.innerHTML = html;
}

function escapeHtml(str){
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

// ============== UI: NAVEGACION ADMIN ==============
const clientView = document.getElementById("clientView");
const adminLoginView = document.getElementById("adminLoginView");
const adminView = document.getElementById("adminView");
const adminLink = document.getElementById("adminLink");
const backToClientBtn = document.getElementById("backToClientBtn");
const pinInput = document.getElementById("pinInput");
const pinSubmitBtn = document.getElementById("pinSubmitBtn");
const logoutAdminBtn = document.getElementById("logoutAdminBtn");

adminLink.addEventListener("click", (e) => {
  e.preventDefault();
  clientView.classList.add("hidden");
  adminLoginView.classList.remove("hidden");
  pinInput.value = "";
  pinInput.focus();
});

backToClientBtn.addEventListener("click", () => {
  adminLoginView.classList.add("hidden");
  clientView.classList.remove("hidden");
});

pinSubmitBtn.addEventListener("click", checkPin);
pinInput.addEventListener("keypress", (e) => {
  if(e.key === "Enter") checkPin();
});

async function checkPin(){
  if(pinInput.value === ADMIN_PIN){
    adminLoginView.classList.add("hidden");
    adminView.classList.remove("hidden");
    await loadAdminBenefits();
  }else{
    showToast("PIN incorrecto");
  }
}

logoutAdminBtn.addEventListener("click", () => {
  adminView.classList.add("hidden");
  clientView.classList.remove("hidden");
});

// ============== UI: ADMIN - GESTION DE BENEFICIOS ==============
const newBenefitName = document.getElementById("newBenefitName");
const newBenefitPoints = document.getElementById("newBenefitPoints");
const addBenefitBtn = document.getElementById("addBenefitBtn");
const adminList = document.getElementById("adminList");
const emptyAdminMsg = document.getElementById("emptyAdminMsg");

addBenefitBtn.addEventListener("click", addBenefit);

const clearAllBtn = document.getElementById("clearAllBtn");
clearAllBtn.addEventListener("click", clearAllBenefits);

async function clearAllBenefits(){
  if(benefits.length === 0){
    showToast("No hay nada para vaciar");
    return;
  }
  if(!confirm(`¿Seguro que querés borrar los ${benefits.length} beneficio(s) cargados? Esta acción no se puede deshacer.`)) return;
  if(!confirm("Confirmá de nuevo: se va a borrar TODO el listado de beneficios.")) return;

  clearAllBtn.disabled = true;
  const backup = [...benefits];
  benefits = [];

  const ok = await redisSet(BENEFITS_KEY, benefits);
  if(ok){
    renderAdminList();
    showToast("Listado vaciado");
  }else{
    benefits = backup;
    showToast("Error al vaciar, intentá de nuevo");
  }
  clearAllBtn.disabled = false;
}

async function loadAdminBenefits(){
  adminList.innerHTML = `<div class="spinner-wrap"><div class="spinner"></div> Cargando...</div>`;
  try{
    benefits = await redisGet(BENEFITS_KEY) || [];
    renderAdminList();
  }catch(e){
    console.error(e);
    adminList.innerHTML = `<div class="error-msg">Error técnico: ${escapeHtml(e.message || String(e))}</div>`;
  }
}

function renderAdminList(){
  if(benefits.length === 0){
    adminList.innerHTML = "";
    emptyAdminMsg.classList.remove("hidden");
    return;
  }
  emptyAdminMsg.classList.add("hidden");

  const ordenados = [...benefits].sort((a,b) => a.points - b.points);
  adminList.innerHTML = ordenados.map(b => `
    <div class="admin-item">
      <div class="admin-item-info">
        <div class="benefit-name">${escapeHtml(b.name)}</div>
        <div class="benefit-points">${b.points} puntos</div>
      </div>
      <div class="admin-item-actions">
        <button class="btn-secondary" onclick="editBenefit('${b.id}')">Editar</button>
        <button class="btn-danger" onclick="deleteBenefit('${b.id}')">Borrar</button>
      </div>
    </div>
  `).join("");
}

async function addBenefit(){
  const name = newBenefitName.value.trim();
  const points = parseInt(newBenefitPoints.value, 10);

  if(!name){
    showToast("Ingresá un nombre");
    return;
  }
  if(!points || points <= 0){
    showToast("Ingresá una cantidad de puntos válida");
    return;
  }

  addBenefitBtn.disabled = true;
  const nuevo = { id: Date.now().toString(), name, points };
  benefits.push(nuevo);

  const ok = await redisSet(BENEFITS_KEY, benefits);
  if(ok){
    newBenefitName.value = "";
    newBenefitPoints.value = "";
    renderAdminList();
    showToast("Beneficio agregado");
  }else{
    benefits.pop();
    showToast("Error al guardar, intentá de nuevo");
  }
  addBenefitBtn.disabled = false;
}

window.editBenefit = async function(id){
  const b = benefits.find(x => x.id === id);
  if(!b) return;

  const nuevoNombre = prompt("Nombre del beneficio:", b.name);
  if(nuevoNombre === null) return;
  const nuevoPuntosStr = prompt("Puntos necesarios:", b.points);
  if(nuevoPuntosStr === null) return;

  const nuevoPuntos = parseInt(nuevoPuntosStr, 10);
  if(!nuevoNombre.trim() || !nuevoPuntos || nuevoPuntos <= 0){
    showToast("Datos inválidos");
    return;
  }

  const backup = { ...b };
  b.name = nuevoNombre.trim();
  b.points = nuevoPuntos;

  const ok = await redisSet(BENEFITS_KEY, benefits);
  if(ok){
    renderAdminList();
    showToast("Beneficio actualizado");
  }else{
    Object.assign(b, backup);
    showToast("Error al guardar, intentá de nuevo");
  }
};

window.deleteBenefit = async function(id){
  if(!confirm("¿Borrar este beneficio?")) return;

  const backup = [...benefits];
  benefits = benefits.filter(x => x.id !== id);

  const ok = await redisSet(BENEFITS_KEY, benefits);
  if(ok){
    renderAdminList();
    showToast("Beneficio borrado");
  }else{
    benefits = backup;
    showToast("Error al borrar, intentá de nuevo");
  }
};

// ============== TOAST ==============
function showToast(msg){
  const existing = document.querySelector(".toast");
  if(existing) existing.remove();

  const toast = document.createElement("div");
  toast.className = "toast";
  toast.textContent = msg;
  document.body.appendChild(toast);

  setTimeout(() => {
    toast.classList.add("toast-out");
    setTimeout(() => toast.remove(), 200);
  }, 2300);
}
</script>
